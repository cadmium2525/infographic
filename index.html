<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infographic Canvas Maker v8</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Kiwi+Maru&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
    <style>
        html, body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #121214;
            color: #e3e3e6;
            overflow: hidden;
            margin: 0; padding: 0;
            /* iOSのSafariツールバーを除いた実際の表示高さをJS側でセットする */
            height: 100%;
        }
        #main-canvas {
            touch-action: none;
        }
        /* フッターはタッチスクロールを明示的に許可 */
        .footer-fixed {
            touch-action: pan-y;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        .footer-fixed input[type="range"] {
            touch-action: pan-x;
        }
        .app-layout {
            display: flex;
            flex-direction: column;
            /* JSがセットするCSS変数 --app-height を使用 */
            height: var(--app-height, 100%);
            overflow: hidden;
        }
        .canvas-area {
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }
        .footer-fixed {
            flex-shrink: 0;
            /* フッターの最大高さもCSS変数で動的制御 */
            max-height: var(--footer-max-height, 260px);
            overflow-y: auto;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ③ プレビューモーダル */
        #preview-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000000cc;
            align-items: center;
            justify-content: center;
        }
        #preview-modal.open { display: flex; }
        #preview-modal canvas {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        /* ④ 画像編集モーダル */
        #image-editor-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9998;
            background: #000000ee;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            gap: 12px;
        }
        #image-editor-modal.open { display: flex; }
        #crop-canvas-wrapper {
            position: relative;
            display: inline-block;
            cursor: crosshair;
            max-width: 100%;
            max-height: 50vh;
            overflow: hidden;
        }
        #editor-canvas { display: block; max-width: 100%; max-height: 50vh; }
        #crop-overlay {
            position: absolute;
            border: 2px dashed #10b981;
            pointer-events: none;
            display: none;
        }

        /* スライダーコンテナのスクロール */
        .tab-scroll { overflow-y: auto; max-height: 130px; }


    </style>
</head>
<body class="select-none">

<!-- ② プレビューモーダル -->
<div id="preview-modal">
    <div style="position:relative; max-width:100vw; max-height:100vh;">
        <canvas id="preview-canvas" style="max-width:100vw;max-height:100vh;display:block;"></canvas>
        <button onclick="closePreview()" style="position:absolute;top:8px;right:8px;background:#ef4444;color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:20px;cursor:pointer;line-height:1;">✕</button>
    </div>
</div>

<!-- ④ 画像編集モーダル -->
<div id="image-editor-modal">
    <div class="w-full max-w-sm">
        <h2 class="text-white text-sm font-bold mb-2 text-center">画像を加工してから追加</h2>

        <!-- ファイル選択 -->
        <input type="file" id="editor-file-input" accept="image/*" class="text-xs text-zinc-400 file:mr-2 file:bg-zinc-800 file:text-zinc-200 file:px-2 file:py-1 file:rounded mb-2 w-full">

        <!-- 編集キャンバス -->
        <div id="crop-canvas-wrapper" class="mx-auto mb-2 bg-zinc-900 rounded">
            <canvas id="editor-canvas" width="320" height="240"></canvas>
            <div id="crop-overlay"></div>
        </div>

        <!-- 加工ツール -->
        <div class="grid grid-cols-3 gap-1.5 mb-2">
            <button onclick="editorSetMode('crop')" id="btn-mode-crop" class="editor-mode-btn p-1.5 bg-[#2a2a30] text-zinc-300 rounded text-[10px] border border-[#3a3a40]">✂️ トリミング</button>
            <button onclick="editorSetMode('color')" id="btn-mode-color" class="editor-mode-btn p-1.5 bg-[#2a2a30] text-zinc-300 rounded text-[10px] border border-[#3a3a40]">🎨 色透過</button>
            <button onclick="editorSetMode('none')" id="btn-mode-none" class="editor-mode-btn p-1.5 bg-emerald-500/20 text-emerald-400 rounded text-[10px] border border-emerald-500/30">🖼️ 通常</button>
        </div>

        <!-- 色透過コントロール -->
        <div id="color-trans-controls" class="hidden bg-[#1a1a1e] rounded p-2 mb-2 space-y-1.5">
            <div class="text-[10px] text-zinc-400">透過する色をタップ/クリックして選択</div>
            <div class="flex items-center gap-2">
                <div id="picked-color-preview" class="w-8 h-8 rounded border border-zinc-500 bg-white"></div>
                <div>
                    <div class="text-[10px] text-zinc-400 mb-0.5">透過しきい値</div>
                    <input type="range" id="color-threshold" min="0" max="100" value="30" class="w-36 accent-emerald-500">
                </div>
            </div>
            <button onclick="applyColorTransparency()" class="w-full bg-emerald-700 text-white text-[11px] py-1 rounded">この色を透過する</button>
        </div>

        <!-- トリミングコントロール -->
        <div id="crop-controls" class="hidden bg-[#1a1a1e] rounded p-2 mb-2 space-y-1.5">
            <div class="text-[10px] text-zinc-400">キャンバス上でドラッグしてトリミング範囲を選択</div>
            <button onclick="applyCrop()" class="w-full bg-emerald-700 text-white text-[11px] py-1 rounded">トリミングを適用</button>
        </div>

        <!-- アクションボタン -->
        <div class="flex gap-2">
            <button onclick="closeImageEditor()" class="flex-1 bg-zinc-700 text-zinc-200 text-xs py-2 rounded">キャンセル</button>
            <button onclick="resetEditorImage()" class="flex-1 bg-zinc-600 text-zinc-200 text-xs py-2 rounded">リセット</button>
            <button onclick="confirmEditorImage()" class="flex-1 bg-emerald-500 text-black font-bold text-xs py-2 rounded">✓ キャンバスに追加</button>
        </div>
    </div>
</div>

<div class="app-layout">
    <!-- ② ヘッダー常時表示 -->
    <header class="p-3 bg-[#1a1a1e] border-b border-[#2a2a30] flex justify-between items-center shrink-0">
        <h1 class="text-sm font-bold tracking-wider text-emerald-400">INFO_GRAPHIC.js v8</h1>
        <div class="flex gap-2 items-center">
            <!-- ③ プレビューボタン -->
            <button onclick="openPreview()" class="bg-indigo-500 hover:bg-indigo-600 text-white text-xs font-bold px-2 py-1 rounded transition-all">👁 全画面</button>
            <select id="export-size" class="bg-[#2a2a30] text-xs text-white rounded px-1.5 py-1 border border-[#3a3a40]">
                <option value="1080x1080">正方形</option>
                <option value="1080x1920" selected>縦長</option>
                <option value="1200x630">横長</option>
                <option value="1191x842">A4横</option>
            </select>
            <button id="btn-save" class="bg-emerald-500 hover:bg-emerald-600 text-black text-xs font-bold px-3 py-1 rounded transition-all">保存</button>
        </div>
    </header>

    <!-- キャンバスエリア -->
    <main class="canvas-area flex items-center justify-center p-2 bg-[#0e0e10] relative overflow-hidden">
        <div class="relative shadow-2xl border border-[#2a2a30] rounded-lg overflow-hidden max-w-full h-full flex items-center justify-center">
            <canvas id="main-canvas" width="1080" height="1920" style="aspect-ratio: 1080 / 1920;" class="max-w-full max-h-full block bg-white"></canvas>
        </div>
    </main>

    <!-- ② フッターをスクロール可能な固定エリアに -->
    <footer class="footer-fixed bg-[#1a1a1e] border-t border-[#2a2a30] p-3 z-10">

        <div class="flex justify-around border-b border-[#2a2a30] pb-2 mb-2 text-xs overflow-x-auto no-scrollbar gap-1.5">
            <button onclick="switchTab('tab-bg')" class="tab-btn px-2.5 py-1 rounded-full bg-emerald-500/10 text-emerald-400 font-bold whitespace-nowrap" id="btn-tab-bg">背景</button>
            <button onclick="switchTab('tab-shape')" class="tab-btn px-2.5 py-1 rounded-full text-zinc-400 whitespace-nowrap" id="btn-tab-shape">図形</button>
            <button onclick="switchTab('tab-text')" class="tab-btn px-2.5 py-1 rounded-full text-zinc-400 whitespace-nowrap" id="btn-tab-text">テキスト</button>
            <button onclick="switchTab('tab-image')" class="tab-btn px-2.5 py-1 rounded-full text-zinc-400 whitespace-nowrap" id="btn-tab-image">画像</button>
            <button onclick="switchTab('tab-layer')" class="tab-btn px-2.5 py-1 rounded-full text-zinc-400 relative whitespace-nowrap" id="btn-tab-layer">
                レイヤー <span id="layer-count" class="bg-emerald-500 text-black rounded-full px-1 text-[9px] absolute -top-1 -right-2 font-bold">0</span>
            </button>
        </div>

        <div class="tab-scroll no-scrollbar text-sm">
            <!-- 背景タブ -->
            <div id="tab-bg" class="tab-content flex flex-col gap-2">
                <div class="grid grid-cols-4 gap-1.5">
                    <button onclick="setBg('solid', '#ffffff')" class="h-8 bg-white rounded border border-zinc-300"></button>
                    <button onclick="setBg('solid', '#f4f4f5')" class="h-8 bg-zinc-100 rounded border border-zinc-300"></button>
                    <button onclick="setBg('grad-modern')" class="h-8 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded text-[9px] text-white flex items-center justify-center font-bold">Modern</button>
                    <button onclick="setBg('grad-sunset')" class="h-8 bg-gradient-to-tr from-amber-500 to-rose-500 rounded text-[9px] text-white flex items-center justify-center font-bold">Sunset</button>
                    <button onclick="setBg('pattern-grid')" class="h-8 bg-zinc-800 rounded text-[9px] text-zinc-400 flex items-center justify-center border border-dashed border-zinc-600">方眼</button>
                    <button onclick="setBg('pattern-split')" class="h-8 bg-gradient-to-r from-zinc-200 to-zinc-400 rounded text-[9px] text-zinc-800 flex items-center justify-center font-bold">分割</button>
                    <button onclick="setBg('pattern-three')" class="h-8 bg-zinc-700 rounded text-[9px] text-zinc-200 flex items-center justify-center font-bold">3段</button>
                </div>
                <div class="flex flex-col gap-1">
                    <input type="file" id="bg-upload" accept="image/*" class="text-xs text-zinc-400 file:mr-2 file:bg-zinc-800 file:text-zinc-200 file:px-2 file:py-1 file:rounded">
                    <!-- ① 背景透明度スライダー（常に機能するよう修正） -->
                    <div id="bg-opacity-container" class="hidden bg-[#2a2a30]/40 p-2 rounded border border-[#2a2a30]">
                        <div class="flex justify-between text-[10px] text-zinc-400 mb-0.5">
                            <span>背景画像の透明度</span>
                            <span id="bg-opacity-value">100%</span>
                        </div>
                        <input type="range" id="bg-image-opacity" min="0" max="1" step="0.05" value="1" class="w-full accent-emerald-500">
                    </div>
                </div>
            </div>

            <!-- ⑤ 図形タブ（△追加、角丸対応） -->
            <div id="tab-shape" class="tab-content hidden flex flex-col gap-2">
                <div class="grid grid-cols-4 gap-1.5">
                    <button onclick="addShape('rect')" class="p-2 bg-[#2a2a30] rounded text-xs text-center hover:bg-[#3a3a40]">■ 四角</button>
                    <button onclick="addShape('triangle')" class="p-2 bg-[#2a2a30] rounded text-xs text-center hover:bg-[#3a3a40]">▲ 三角</button>
                    <button onclick="addShape('circle')" class="p-2 bg-[#2a2a30] rounded text-xs text-center hover:bg-[#3a3a40]">● 円</button>
                    <button onclick="addShape('line')" class="p-2 bg-[#2a2a30] rounded text-xs text-center hover:bg-[#3a3a40]">― 線</button>
                </div>
                <div class="flex items-center gap-2 text-xs">
                    <span class="text-zinc-400 shrink-0">カラー:</span>
                    <input type="color" id="shape-color" value="#3b82f6" class="bg-transparent border-0 w-8 h-8 cursor-pointer">
                </div>
            </div>

            <!-- テキストタブ -->
            <div id="tab-text" class="tab-content hidden flex flex-col gap-2">
                <div class="flex gap-2">
                    <input type="text" id="text-input" placeholder="テキストを入力..." class="flex-1 bg-[#2a2a30] border border-[#3a3a40] rounded px-2 py-1 text-xs text-white focus:outline-none">
                    <button onclick="addText()" class="bg-emerald-500 text-black px-3 py-1 rounded font-bold text-xs shrink-0">追加</button>
                </div>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <select id="text-font" class="w-full bg-[#2a2a30] text-white rounded p-1 border border-[#3a3a40]">
                        <option value="'Noto Sans JP', sans-serif">モダンゴシック</option>
                        <option value="'Noto Serif JP', serif">洗練された明朝</option>
                        <option value="'Kiwi Maru', serif">可愛い丸文字</option>
                        <option value="'DotGothic16', sans-serif">レトロドット</option>
                    </select>
                    <input type="color" id="text-color" value="#18181b" class="w-full bg-transparent border-0 h-6 cursor-pointer">
                </div>
            </div>

            <!-- ④ 画像タブ（加工機能追加） -->
            <div id="tab-image" class="tab-content hidden flex flex-col gap-2">
                <div class="flex gap-2">
                    <button onclick="openImageEditor()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white text-xs py-2 rounded font-bold">✏️ 画像を加工してから追加</button>
                </div>
                <div class="border-t border-[#2a2a30] pt-2">
                    <div class="text-[10px] text-zinc-500 mb-1">▼ 加工なしで直接追加</div>
                    <input type="file" id="layer-image-upload" accept="image/*" class="text-xs text-zinc-400 file:mr-2 file:bg-zinc-800 file:text-zinc-200 file:px-2 file:py-1 file:rounded">
                </div>
            </div>

            <!-- レイヤータブ -->
            <div id="tab-layer" class="tab-content hidden flex flex-col gap-2">
                <div id="layer-list" class="flex flex-col gap-1 max-h-24 overflow-y-auto"></div>
            </div>
        </div>

        <!-- スライダー（選択オブジェクト用） -->
        <div id="universal-sliders" class="hidden mt-2 pt-2 border-t border-[#2a2a30] flex flex-col gap-1.5">
            <div>
                <div class="flex justify-between text-[11px] text-zinc-400 mb-0.5">
                    <span>回転角度</span>
                    <span id="angle-slider-value">0°</span>
                </div>
                <input type="range" id="object-angle" min="0" max="360" step="1" value="0" class="w-full accent-emerald-400">
            </div>

            <div id="size-control-dynamic" class="grid grid-cols-1 gap-1.5">
                <div id="container-size-x">
                    <div class="flex justify-between text-[11px] text-zinc-400 mb-0.5">
                        <span id="label-size-x">横幅 / サイズ</span>
                        <span id="val-size-x">1.00</span>
                    </div>
                    <input type="range" id="object-size-x" min="10" max="2000" step="5" value="200" class="w-full accent-emerald-400">
                </div>
                <div id="container-size-y" class="hidden">
                    <div class="flex justify-between text-[11px] text-zinc-400 mb-0.5">
                        <span id="label-size-y">縦幅</span>
                        <span id="val-size-y">1.00</span>
                    </div>
                    <input type="range" id="object-size-y" min="10" max="2000" step="5" value="200" class="w-full accent-emerald-400">
                </div>
                <!-- ⑤ 選択中の角丸スライダー（インスペクター内） -->
                <div id="container-corner-radius" class="hidden">
                    <div class="flex justify-between text-[11px] text-zinc-400 mb-0.5">
                        <span>角丸</span>
                        <span id="val-corner-radius">0 px</span>
                    </div>
                    <input type="range" id="object-corner-radius" min="0" max="200" step="2" value="0" class="w-full accent-emerald-400">
                </div>
                <div>
                    <div class="flex justify-between text-[11px] text-zinc-400 mb-0.5">
                        <span>オブジェクト不透明度</span>
                        <span id="opacity-slider-value">100%</span>
                    </div>
                    <input type="range" id="object-opacity" min="0" max="1" step="0.05" value="1" class="w-full accent-emerald-400">
                </div>
            </div>
        </div>

        <div id="inspector" class="hidden mt-2 pt-2 border-t border-[#2a2a30] flex items-center justify-between text-xs text-zinc-400">
            <span id="inspector-title">選択中</span>
            <div class="flex gap-1.5">
                <button onclick="moveLayerOrder('up')" class="bg-[#2a2a30] px-2 py-1 rounded text-white hover:bg-[#3a3a40] text-[11px]">前面へ</button>
                <button onclick="moveLayerOrder('down')" class="bg-[#2a2a30] px-2 py-1 rounded text-white hover:bg-[#3a3a40] text-[11px]">背面へ</button>
                <button onclick="deleteSelectedLayer()" class="bg-rose-950 text-rose-400 px-2 py-1 rounded font-bold text-[11px] border border-rose-900/50">削除</button>
            </div>
        </div>
    </footer>
</div>

<script>
    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');

    // iOSのSafariツールバーを考慮した実際の表示高さをCSS変数にセット
    function setAppHeight() {
        const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        const footerMax = Math.max(200, Math.min(280, Math.floor(h * 0.42)));
        document.documentElement.style.setProperty('--app-height', h + 'px');
        document.documentElement.style.setProperty('--footer-max-height', footerMax + 'px');
    }
    setAppHeight();
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setAppHeight);
    }
    window.addEventListener('resize', setAppHeight);

    let appState = {
        bgType: 'pattern', bgColor: '#ffffff', bgPattern: 'pattern-grid', bgImage: null, bgOpacity: 1,
        layers: [], selectedLayerIndex: null, isDragging: false, startX: 0, startY: 0
    };

    // ④ 画像エディタ状態
    let editorState = {
        originalImage: null,
        currentImageData: null,
        editorCanvas: null,
        editorCtx: null,
        mode: 'none',
        cropStart: null,
        cropEnd: null,
        isCropping: false,
        pickedColor: null,
    };

    window.addEventListener('DOMContentLoaded', () => {
        setupEventListeners();
        setupImageEditor();
        render();

        // フッター内のタッチはキャンバスのドラッグ処理に伝播させない
        const footer = document.querySelector('.footer-fixed');
        footer.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true });
        footer.addEventListener('touchmove', (e) => e.stopPropagation(), { passive: true });
        footer.addEventListener('touchend', (e) => e.stopPropagation(), { passive: true });
    });

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('bg-emerald-500/10', 'text-emerald-400', 'font-bold'));
        document.getElementById(tabId).classList.remove('hidden');
        document.getElementById(`btn-${tabId}`).classList.add('bg-emerald-500/10', 'text-emerald-400', 'font-bold');
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackground();
        
        appState.layers.forEach((layer, index) => {
            ctx.save();
            
            let cx = layer.x + (layer.realW || layer.w) / 2;
            let cy = layer.y + (layer.realH || layer.h) / 2;
            
            ctx.translate(cx, cy);
            if (layer.angle) ctx.rotate((layer.angle * Math.PI) / 180);
            ctx.translate(-cx, -cy);

            ctx.globalAlpha = layer.opacity !== undefined ? layer.opacity : 1;

            if (layer.type === 'text') {
                ctx.font = `${layer.w}px ${layer.fontFamily}`;
                ctx.fillStyle = layer.color;
                ctx.textBaseline = 'top';
                ctx.fillText(layer.text, layer.x, layer.y);
                const metrics = ctx.measureText(layer.text);
                layer.realW = metrics.width;
                layer.realH = layer.w;
            } 
            else if (layer.type === 'shape') {
                ctx.fillStyle = layer.color;
                ctx.strokeStyle = layer.color;
                ctx.lineWidth = 6;
                
                if (layer.shapeType === 'rect') {
                    // ⑤ 角丸四角形
                    const r = Math.min(layer.cornerRadius || 0, layer.w / 2, layer.h / 2);
                    drawRoundRect(ctx, layer.x, layer.y, layer.w, layer.h, r);
                    ctx.fill();
                    layer.realW = layer.w; layer.realH = layer.h;
                } else if (layer.shapeType === 'triangle') {
                    // ⑤ 三角形（角丸対応）
                    drawTriangle(ctx, layer.x, layer.y, layer.w, layer.h, layer.cornerRadius || 0);
                    ctx.fill();
                    layer.realW = layer.w; layer.realH = layer.h;
                } else if (layer.shapeType === 'circle') {
                    ctx.beginPath();
                    ctx.ellipse(layer.x + layer.w/2, layer.y + layer.h/2, layer.w/2, layer.h/2, 0, 0, Math.PI * 2);
                    ctx.fill();
                    layer.realW = layer.w; layer.realH = layer.h;
                } else if (layer.shapeType === 'line') {
                    ctx.beginPath(); 
                    ctx.moveTo(layer.x, layer.y + layer.h/2); 
                    ctx.lineTo(layer.x + layer.w, layer.y + layer.h/2); 
                    ctx.stroke();
                    layer.realW = layer.w; layer.realH = layer.h;
                }
            } 
            else if (layer.type === 'image' && layer.img) {
                ctx.drawImage(layer.img, layer.x, layer.y, layer.w, layer.h);
                layer.realW = layer.w; layer.realH = layer.h;
            }

            if (index === appState.selectedLayerIndex) {
                ctx.restore(); ctx.save();
                ctx.translate(cx, cy);
                if (layer.angle) ctx.rotate((layer.angle * Math.PI) / 180);
                ctx.translate(-cx, -cy);
                ctx.strokeStyle = '#10b981'; ctx.lineWidth = 3; ctx.setLineDash([6, 4]);
                const tw = layer.type === 'text' ? layer.realW : layer.w;
                const th = layer.type === 'text' ? layer.realH : layer.h;
                ctx.strokeRect(layer.x - 6, layer.y - 6, tw + 12, th + 12);
            }
            ctx.restore();
        });

        updateLayerUI();
        updateControlSlidersUI();
    }

    // ⑤ 角丸矩形ヘルパー
    function drawRoundRect(ctx, x, y, w, h, r) {
        if (r <= 0) { ctx.beginPath(); ctx.rect(x, y, w, h); return; }
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    // ⑤ 三角形（角丸対応）
    function drawTriangle(ctx, x, y, w, h, r) {
        // 頂点: 上中央, 左下, 右下
        const p1 = { x: x + w/2, y: y };
        const p2 = { x: x, y: y + h };
        const p3 = { x: x + w, y: y + h };
        if (r <= 0) {
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.lineTo(p3.x, p3.y);
            ctx.closePath();
            return;
        }
        // 角丸三角形
        ctx.beginPath();
        drawRoundedPolygon(ctx, [p1, p2, p3], r);
        ctx.closePath();
    }

    function drawRoundedPolygon(ctx, points, r) {
        const n = points.length;
        for (let i = 0; i < n; i++) {
            const prev = points[(i - 1 + n) % n];
            const curr = points[i];
            const next = points[(i + 1) % n];

            // curr→prev方向の単位ベクトル
            const d1x = prev.x - curr.x, d1y = prev.y - curr.y;
            const l1 = Math.sqrt(d1x*d1x + d1y*d1y);
            const u1x = d1x/l1, u1y = d1y/l1;

            // curr→next方向の単位ベクトル
            const d2x = next.x - curr.x, d2y = next.y - curr.y;
            const l2 = Math.sqrt(d2x*d2x + d2y*d2y);
            const u2x = d2x/l2, u2y = d2y/l2;

            const rad = Math.min(r, l1/2, l2/2);

            const p1x = curr.x + u1x * rad;
            const p1y = curr.y + u1y * rad;
            const p2x = curr.x + u2x * rad;
            const p2y = curr.y + u2y * rad;

            if (i === 0) ctx.moveTo(p1x, p1y);
            else ctx.lineTo(p1x, p1y);
            ctx.quadraticCurveTo(curr.x, curr.y, p2x, p2y);
        }
    }

    function drawBackground() {
        ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (appState.bgType === 'solid') {
            ctx.fillStyle = appState.bgColor; ctx.fillRect(0, 0, canvas.width, canvas.height);
        } else if (appState.bgType === 'gradient') {
            let grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            if (appState.bgPattern === 'grad-modern') { grad.addColorStop(0, '#6366f1'); grad.addColorStop(1, '#a855f7'); }
            else { grad.addColorStop(0, '#f59e0b'); grad.addColorStop(1, '#f43f5e'); }
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
        } else if (appState.bgType === 'pattern') {
            if (appState.bgPattern === 'pattern-grid') {
                ctx.strokeStyle = '#e4e4e7'; ctx.lineWidth = 1;
                for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
                for(let j=0; j<canvas.height; j+=40) { ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke(); }
            } else if (appState.bgPattern === 'pattern-split') {
                ctx.fillStyle = '#f4f4f5'; ctx.fillRect(0, 0, canvas.width / 2, canvas.height);
                ctx.fillStyle = '#e4e4e7'; ctx.fillRect(canvas.width / 2, 0, canvas.width / 2, canvas.height);
            } else if (appState.bgPattern === 'pattern-three') {
                const h = canvas.height / 3;
                ctx.fillStyle = '#f8fafc'; ctx.fillRect(0, 0, canvas.width, h);
                ctx.fillStyle = '#f1f5f9'; ctx.fillRect(0, h, canvas.width, h);
                ctx.fillStyle = '#e2e8f0'; ctx.fillRect(0, h*2, canvas.width, h);
            }
        } else if (appState.bgType === 'image' && appState.bgImage) {
            // ① 背景画像の透明度（白背景を先に塗り、その上に半透明で重ねる）
            ctx.save();
            ctx.globalAlpha = appState.bgOpacity;
            ctx.drawImage(appState.bgImage, 0, 0, canvas.width, canvas.height);
            ctx.restore();
        }
    }

    function setBg(type, val) {
        if (type === 'solid') { appState.bgType = 'solid'; appState.bgColor = val; }
        else if (type.startsWith('pattern-')) { appState.bgType = 'pattern'; appState.bgPattern = type; }
        else { appState.bgType = 'gradient'; appState.bgPattern = type; }
        if (type !== 'image') document.getElementById('bg-opacity-container').classList.add('hidden');

        });

    function moveLayerOrder(dir) {
        const idx = appState.selectedLayerIndex; if (idx === null) return;
        if (dir === 'up' && idx < appState.layers.length - 1) {
            [appState.layers[idx], appState.layers[idx + 1]] = [appState.layers[idx + 1], appState.layers[idx]];
            appState.selectedLayerIndex = idx + 1;
        } else if (dir === 'down' && idx > 0) {
            [appState.layers[idx], appState.layers[idx - 1]] = [appState.layers[idx - 1], appState.layers[idx]];
            appState.selectedLayerIndex = idx - 1;
        }
        render();
    }

    function updateLayerUI() {
        document.getElementById('layer-count').innerText = appState.layers.length;
        const container = document.getElementById('layer-list'); container.innerHTML = '';

        [...appState.layers].reverse().forEach((layer, revIdx) => {
            const actualIdx = appState.layers.length - 1 - revIdx;
            const isSelected = actualIdx === appState.selectedLayerIndex;
            const item = document.createElement('div');
            item.className = `flex justify-between items-center p-1.5 rounded text-[11px] cursor-pointer ${isSelected ? 'bg-emerald-400 text-black font-bold' : 'bg-[#2a2a30] text-zinc-300'}`;
            item.innerText = `${actualIdx + 1}. [${layer.type}] ${layer.text || layer.shapeType || '画像'}`;
            item.onclick = () => { appState.selectedLayerIndex = actualIdx; render(); };

        });

    // ④ 画像エディタ
    function setupImageEditor() {
        editorState.editorCanvas = document.getElementById('editor-canvas');
        editorState.editorCtx = editorState.editorCanvas.getContext('2d', { willReadFrequently: true });

        document.getElementById('editor-file-input').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    editorState.originalImage = img;
                    renderEditorCanvas(img);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        // クロップ操作
        const ec = editorState.editorCanvas;
        const overlay = document.getElementById('crop-overlay');
        let startX, startY;

        const getEditorCoords = (e) => {
            const rect = ec.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        };

        const startCrop = (e) => {
            if (editorState.mode !== 'crop') return;
            e.preventDefault();
            const p = getEditorCoords(e);
            startX = p.x; startY = p.y;
            editorState.isCropping = true;
            overlay.style.display = 'block';
            overlay.style.left = startX + 'px';
            overlay.style.top = startY + 'px';
            overlay.style.width = '0px';
            overlay.style.height = '0px';
            editorState.cropStart = p;
        };
        const moveCrop = (e) => {
            if (!editorState.isCropping) return;
            e.preventDefault();
            const p = getEditorCoords(e);
            const w = p.x - startX, h = p.y - startY;
            overlay.style.left = (w < 0 ? p.x : startX) + 'px';
            overlay.style.top = (h < 0 ? p.y : startY) + 'px';
            overlay.style.width = Math.abs(w) + 'px';
            overlay.style.height = Math.abs(h) + 'px';
            editorState.cropEnd = p;
        };
        const endCrop = (e) => { editorState.isCropping = false; };

        ec.addEventListener('mousedown', startCrop);
        ec.addEventListener('mousemove', moveCrop);
        ec.addEventListener('mouseup', endCrop);
        ec.addEventListener('touchstart', startCrop, { passive: false });
        ec.addEventListener('touchmove', moveCrop, { passive: false });
        ec.addEventListener('touchend', endCrop);

        // 色透過：クリックで色を拾う
        ec.addEventListener('click', (e) => {
            if (editorState.mode !== 'color') return;
            const p = getEditorCoords(e);
            const scaleX = editorState.editorCanvas.width / editorState.editorCanvas.getBoundingClientRect().width;
            const scaleY = editorState.editorCanvas.height / editorState.editorCanvas.getBoundingClientRect().height;
            const data = editorState.editorCtx.getImageData(Math.round(p.x * scaleX), Math.round(p.y * scaleY), 1, 1).data;
            editorState.pickedColor = { r: data[0], g: data[1], b: data[2] };
            const hex = '#' + [data[0], data[1], data[2]].map(v => v.toString(16).padStart(2, '0')).join('');
            document.getElementById('picked-color-preview').style.backgroundColor = hex;
        });

        document.getElementById('color-threshold').addEventListener('input', () => {
            // プレビューは確定後のみ
        });
    }

    function renderEditorCanvas(source) {
        const ec = editorState.editorCanvas;
        const ectx = editorState.editorCtx;

        // サイズをソースに合わせる
        const maxW = 320, maxH = 240;
        let w = source.width, h = source.height;
        if (w > maxW) { h = (maxW / w) * h; w = maxW; }
        if (h > maxH) { w = (maxH / h) * w; h = maxH; }
        ec.width = Math.round(w);
        ec.height = Math.round(h);

        ectx.clearRect(0, 0, w, h);
        if (source instanceof HTMLImageElement) {
            ectx.drawImage(source, 0, 0, w, h);
        } else {
            ectx.putImageData(source, 0, 0);
        }

        editorState.currentImageData = ectx.getImageData(0, 0, ec.width, ec.height);
    }

    function editorSetMode(mode) {
        editorState.mode = mode;
        document.querySelectorAll('.editor-mode-btn').forEach(b => {
            b.classList.remove('bg-emerald-500/20', 'text-emerald-400', 'border-emerald-500/30');
            b.classList.add('bg-[#2a2a30]', 'text-zinc-300', 'border-[#3a3a40]');
        });
        document.getElementById(`btn-mode-${mode}`).classList.add('bg-emerald-500/20', 'text-emerald-400', 'border-emerald-500/30');
        document.getElementById(`btn-mode-${mode}`).classList.remove('bg-[#2a2a30]', 'text-zinc-300', 'border-[#3a3a40]');

        document.getElementById('color-trans-controls').classList.toggle('hidden', mode !== 'color');
        document.getElementById('crop-controls').classList.toggle('hidden', mode !== 'crop');
        document.getElementById('crop-overlay').style.display = 'none';
        editorState.pickedColor = null;
    }

    function applyCrop() {
        if (!editorState.cropStart || !editorState.cropEnd) return;
        const ec = editorState.editorCanvas;
        const ectx = editorState.editorCtx;

        const scaleX = ec.width / ec.getBoundingClientRect().width;
        const scaleY = ec.height / ec.getBoundingClientRect().height;

        let x1 = Math.round(Math.min(editorState.cropStart.x, editorState.cropEnd.x) * scaleX);
        let y1 = Math.round(Math.min(editorState.cropStart.y, editorState.cropEnd.y) * scaleY);
        let x2 = Math.round(Math.max(editorState.cropStart.x, editorState.cropEnd.x) * scaleX);
        let y2 = Math.round(Math.max(editorState.cropStart.y, editorState.cropEnd.y) * scaleY);

        x1 = Math.max(0, x1); y1 = Math.max(0, y1);
        x2 = Math.min(ec.width, x2); y2 = Math.min(ec.height, y2);

        if (x2 - x1 < 2 || y2 - y1 < 2) return;

        const cropped = ectx.getImageData(x1, y1, x2 - x1, y2 - y1);
        ec.width = x2 - x1; ec.height = y2 - y1;
        ectx.putImageData(cropped, 0, 0);
        editorState.currentImageData = ectx.getImageData(0, 0, ec.width, ec.height);
        document.getElementById('crop-overlay').style.display = 'none';
        editorState.cropStart = null; editorState.cropEnd = null;
    }

    function applyColorTransparency() {
        if (!editorState.pickedColor) { alert('まずキャンバス上の透過したい色をタップしてください'); return; }
        const ec = editorState.editorCanvas;
        const ectx = editorState.editorCtx;
        const threshold = parseInt(document.getElementById('color-threshold').value);
        const data = ectx.getImageData(0, 0, ec.width, ec.height);
        const { r: tr, g: tg, b: tb } = editorState.pickedColor;

        for (let i = 0; i < data.data.length; i += 4) {
            const dr = Math.abs(data.data[i] - tr);
            const dg = Math.abs(data.data[i+1] - tg);
            const db = Math.abs(data.data[i+2] - tb);
            if ((dr + dg + db) / 3 <= threshold) {
                data.data[i + 3] = 0; // 透明化
            }
        }
        ectx.putImageData(data, 0, 0);
        editorState.currentImageData = ectx.getImageData(0, 0, ec.width, ec.height);
    }

    function resetEditorImage() {
        if (editorState.originalImage) {
            renderEditorCanvas(editorState.originalImage);
        }
    }

    function confirmEditorImage() {
        const ec = editorState.editorCanvas;
        const img = new Image();
        img.onload = () => {
            let w = img.width, h = img.height;
            // キャンバス座標系にスケール（最大500px幅）
            if (w > 500) { h = (500 / w) * h; w = 500; }
            appState.layers.push({ type: 'image', img: img, x: 100, y: 100, w: w, h: h, angle: 0, opacity: 1 });
            appState.selectedLayerIndex = appState.layers.length - 1;
            render();
            closeImageEditor();
        };
        img.src = ec.toDataURL('image/png');
    }

        document.getElementById('object-opacity').addEventListener('input', (e) => {
            if (appState.selectedLayerIndex !== null) {
                appState.layers[appState.selectedLayerIndex].opacity = parseFloat(e.target.value);
                document.getElementById('opacity-slider-value').innerText = Math.round(parseFloat(e.target.value) * 100) + '%';
                render();
            }
        });

        document.getElementById('btn-save').addEventListener('click', () => {
            const prev = appState.selectedLayerIndex; appState.selectedLayerIndex = null; render();
            const link = document.createElement('a'); link.download = `infographic_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png'); link.click();
            appState.selectedLayerIndex = prev; render();
        });

        const getCanvasCoords = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clX = e.touches ? e.touches[0].clientX : e.clientX;
            const clY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: ((clX - rect.left) / rect.width) * canvas.width, y: ((clY - rect.top) / rect.height) * canvas.height };
        };

        const handlePointerDown = (e) => {
            const coords = getCanvasCoords(e); let hit = false;
            for (let i = appState.layers.length - 1; i >= 0; i--) {
                const layer = appState.layers[i];
                const tw = layer.type === 'text' ? layer.realW : layer.w;
                const th = layer.type === 'text' ? layer.realH : layer.h;
                if (coords.x >= layer.x && coords.x <= layer.x + tw && coords.y >= layer.y && coords.y <= layer.y + th) {
                    appState.selectedLayerIndex = i; appState.isDragging = true;
                    appState.startX = coords.x - layer.x; appState.startY = coords.y - layer.y; hit = true; break;
                }
            }
            if (!hit) appState.selectedLayerIndex = null; render();
        };

        canvas.addEventListener('mousedown', handlePointerDown);
        window.addEventListener('mousemove', (e) => {
            if (!appState.isDragging || appState.selectedLayerIndex === null) return;
            const coords = getCanvasCoords(e); const layer = appState.layers[appState.selectedLayerIndex];
            layer.x = coords.x - appState.startX; layer.y = coords.y - appState.startY; render();
        });
        window.addEventListener('mouseup', () => { appState.isDragging = false; });
        canvas.addEventListener('touchstart', (e) => { handlePointerDown(e); }, { passive: false });
        canvas.addEventListener('touchmove', (e) => {
            if (!appState.isDragging || appState.selectedLayerIndex === null) return; e.preventDefault();
            const coords = getCanvasCoords(e); const layer = appState.layers[appState.selectedLayerIndex];
            layer.x = coords.x - appState.startX; layer.y = coords.y - appState.startY; render();
        }, { passive: false });
        canvas.addEventListener('touchend', () => { appState.isDragging = false; });

        // プレビューモーダル背景クリックで閉じる
        document.getElementById('preview-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('preview-modal')) closePreview();
        });
    }
</script>
</body>
</html>
