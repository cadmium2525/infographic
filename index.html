<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infographic Canvas Maker v5</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Kiwi+Maru&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #121214;
            color: #e3e3e6;
            overflow: hidden;
            touch-action: none;
        }
        .canvas-container { max-height: calc(100vh - 380px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col h-screen justify-between select-none">

    <!-- Header -->
    <header class="p-4 bg-[#1a1a1e] border-b border-[#2a2a30] flex justify-between items-center shrink-0">
        <h1 class="text-base font-bold tracking-wider text-emerald-400">INFO_GRAPHIC.js v5</h1>
        <div class="flex gap-2">
            <select id="export-size" class="bg-[#2a2a30] text-xs text-white rounded px-2 py-1 border border-[#3a3a40]">
                <option value="1080x1080">SNS正方形 (1080x1080)</option>
                <option value="1080x1920">SNS縦長 (1080x1920)</option>
                <option value="1200x630">WEBバナー (1200x630)</option>
                <option value="842x595">A4横比率 (1191x842)</option>
            </select>
            <button id="btn-save" class="bg-emerald-500 hover:bg-emerald-600 text-black text-xs font-bold px-3 py-1 rounded transition-all">保存</button>
        </div>
    </header>

    <!-- Canvas Area -->
    <main class="flex-1 flex items-center justify-center p-4 canvas-container bg-[#0e0e10] relative overflow-hidden">
        <div class="relative shadow-2xl border border-[#2a2a30] rounded-lg overflow-hidden max-w-full max-h-full">
            <canvas id="main-canvas" width="1080" height="1080" class="max-w-full max-h-full block bg-white aspect-square"></canvas>
        </div>
    </main>

    <!-- Control Panel -->
    <footer class="bg-[#1a1a1e] border-t border-[#2a2a30] p-4 shrink-0 z-10 shadow-up">
        
        <!-- Tab Navigation -->
        <div class="flex justify-around border-b border-[#2a2a30] pb-2 mb-3 text-xs overflow-x-auto no-scrollbar gap-2">
            <button onclick="switchTab('tab-bg')" class="tab-btn px-3 py-1 rounded-full bg-emerald-500/10 text-emerald-400 font-bold" id="btn-tab-bg">背景</button>
            <button onclick="switchTab('tab-shape')" class="tab-btn px-3 py-1 rounded-full text-zinc-400" id="btn-tab-shape">図形・区切り</button>
            <button onclick="switchTab('tab-text')" class="tab-btn px-3 py-1 rounded-full text-zinc-400" id="btn-tab-text">テキスト</button>
            <button onclick="switchTab('tab-image')" class="tab-btn px-3 py-1 rounded-full text-zinc-400" id="btn-tab-image">画像追加</button>
            <button onclick="switchTab('tab-layer')" class="tab-btn px-3 py-1 rounded-full text-zinc-400 relative" id="btn-tab-layer">
                レイヤー <span id="layer-count" class="bg-emerald-500 text-black rounded-full px-1 text-[9px] absolute -top-1 -right-2 font-bold">0</span>
            </button>
        </div>

        <!-- Tab Contents -->
        <div class="h-32 overflow-y-auto no-scrollbar text-sm">
            <!-- 1. Background Settings -->
            <div id="tab-bg" class="tab-content flex flex-col gap-3">
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="setBg('solid', '#ffffff')" class="h-8 bg-white rounded border border-zinc-300"></button>
                    <button onclick="setBg('solid', '#f4f4f5')" class="h-8 bg-zinc-100 rounded border border-zinc-300"></button>
                    <button onclick="setBg('grad-modern')" class="h-8 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded text-[10px] text-white flex items-center justify-center font-bold">Modern</button>
                    <button onclick="setBg('grad-sunset')" class="h-8 bg-gradient-to-tr from-amber-500 to-rose-500 rounded text-[10px] text-white flex items-center justify-center font-bold">Sunset</button>
                </div>
                <div class="flex flex-col gap-1">
                    <input type="file" id="bg-upload" accept="image/*" class="text-xs text-zinc-400 file:mr-2 file:bg-zinc-800 file:text-zinc-200 file:px-2 file:py-1 file:rounded mb-1">
                    <div id="bg-opacity-container" class="hidden bg-[#2a2a30]/40 p-2 rounded border border-[#2a2a30]">
                        <input type="range" id="bg-image-opacity" min="0" max="1" step="0.05" value="1" class="w-full accent-emerald-500">
                    </div>
                </div>
            </div>

            <!-- 2. Shapes -->
            <div id="tab-shape" class="tab-content hidden flex flex-col gap-2">
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="addShape('rect')" class="p-2 bg-[#2a2a30] rounded text-xs text-center hover:bg-[#3a3a40]">■ 長方形</button>
                    <button onclick="addShape('circle')" class="p-2 bg-[#2a2a30] rounded text-xs text-center hover:bg-[#3a3a40]">● 円・楕円</button>
                    <button onclick="addShape('line')" class="p-2 bg-[#2a2a30] rounded text-xs text-center hover:bg-[#3a3a40]">― 直線</button>
                </div>
                <div class="flex items-center gap-2 text-xs">
                    <span class="text-zinc-400 shrink-0">カラー選択:</span>
                    <input type="color" id="shape-color" value="#3b82f6" class="bg-transparent border-0 w-6 h-6 cursor-pointer">
                </div>
            </div>

            <!-- 3. Text -->
            <div id="tab-text" class="tab-content hidden flex flex-col gap-2">
                <div class="flex gap-2">
                    <input type="text" id="text-input" placeholder="テキストを入力..." class="flex-1 bg-[#2a2a30] border border-[#3a3a40] rounded px-2 py-1 text-xs text-white focus:outline-none">
                    <button onclick="addText()" class="bg-emerald-500 text-black px-3 py-1 rounded font-bold text-xs shrink-0">追加</button>
                </div>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <select id="text-font" class="w-full bg-[#2a2a30] text-white rounded p-1 border border-[#3a3a40]">
                        <option value="'Noto Sans JP', sans-serif">モダンゴシック</option>
                        <option value="'Noto Serif JP', serif">洗練された明朝</option>
                    </select>
                    <input type="color" id="text-color" value="#18181b" class="w-full bg-transparent border-0 h-6 cursor-pointer">
                </div>
            </div>

            <!-- 4. Image Upload -->
            <div id="tab-image" class="tab-content hidden flex flex-col gap-3">
                <input type="file" id="layer-image-upload" accept="image/*" class="text-xs text-zinc-400 file:mr-2 file:bg-zinc-800 file:text-zinc-200 file:px-2 file:py-1 file:rounded">
            </div>

            <!-- 5. Layers Management -->
            <div id="tab-layer" class="tab-content hidden flex flex-col gap-2">
                <div id="layer-list" class="flex flex-col gap-1 max-h-24 overflow-y-auto"></div>
            </div>
        </div>

        <!-- ユニバーサルコントローラー（拡張版） -->
        <div id="universal-sliders" class="hidden mt-2 pt-2 border-t border-[#2a2a30] flex flex-col gap-2">
            <!-- 角度調整（すべてのオブジェクト共通） -->
            <div>
                <div class="flex justify-between text-[11px] text-zinc-400 mb-0.5">
                    <span>回転角度</span>
                    <span id="angle-slider-value">0°</span>
                </div>
                <input type="range" id="object-angle" min="0" max="360" step="1" value="0" class="w-full accent-emerald-400">
            </div>

            <!-- 独立サイズスライダー（図形の場合は幅・高さ、その他は全体の大きさ） -->
            <div id="size-control-dynamic" class="grid grid-cols-1 gap-2">
                <div id="container-size-x">
                    <div class="flex justify-between text-[11px] text-zinc-400 mb-0.5">
                        <span id="label-size-x">横幅 / サイズ</span>
                        <span id="val-size-x">1.00</span>
                    </div>
                    <input type="range" id="object-size-x" min="10" max="1500" step="5" value="200" class="w-full accent-emerald-400">
                </div>
                <div id="container-size-y" class="hidden">
                    <div class="flex justify-between text-[11px] text-zinc-400 mb-0.5">
                        <span id="label-size-y">縦幅</span>
                        <span id="val-size-y">1.00</span>
                    </div>
                    <input type="range" id="object-size-y" min="10" max="1500" step="5" value="200" class="w-full accent-emerald-400">
                </div>
            </div>
        </div>

        <!-- ユニバーサルインスペクター -->
        <div id="inspector" class="hidden mt-2 pt-2 border-t border-[#2a2a30] flex items-center justify-between text-xs text-zinc-400">
            <span id="inspector-title">選択中</span>
            <div class="flex gap-2">
                <button onclick="moveLayerOrder('up')" class="bg-[#2a2a30] px-2 py-1 rounded text-white hover:bg-[#3a3a40]">前面へ</button>
                <button onclick="moveLayerOrder('down')" class="bg-[#2a2a30] px-2 py-1 rounded text-white hover:bg-[#3a3a40]">背面へ</button>
                <button onclick="deleteSelectedLayer()" class="bg-rose-900/40 text-rose-400 px-2 py-1 rounded font-bold">削除</button>
            </div>
        </div>
    </footer>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');

        let appState = {
            bgType: 'solid', bgColor: '#ffffff', bgPattern: 'solid', bgImage: null, bgOpacity: 1,
            layers: [], selectedLayerIndex: null, isDragging: false, startX: 0, startY: 0
        };

        window.addEventListener('DOMContentLoaded', () => { setupEventListeners(); render(); });

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('bg-emerald-500/10', 'text-emerald-400', 'font-bold'));
            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById(`btn-${tabId}`).classList.add('bg-emerald-500/10', 'text-emerald-400', 'font-bold');
        }

        // --- 回転と独立サイズ対応の描画システム ---
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            
            appState.layers.forEach((layer, index) => {
                ctx.save();
                
                // 1. 各レイヤーの基準点（中心点）の算出
                let cx = layer.x + layer.w / 2;
                let cy = layer.y + layer.h / 2;
                
                // 2. キャンバスの座標系を配置中心にずらして回転を適用
                ctx.translate(cx, cy);
                if (layer.angle) {
                    ctx.rotate((layer.angle * Math.PI) / 180);
                }
                ctx.translate(-cx, -cy);

                ctx.globalAlpha = layer.opacity !== undefined ? layer.opacity : 1;

                if (layer.type === 'text') {
                    ctx.font = `${layer.w}px ${layer.fontFamily}`; // テキストはwパラメータをフォントサイズとして扱う
                    ctx.fillStyle = layer.color;
                    ctx.textBaseline = 'top';
                    ctx.fillText(layer.text, layer.x, layer.y);
                    
                    const metrics = ctx.measureText(layer.text);
                    layer.realW = metrics.width;
                    layer.realH = layer.w;
                } 
                else if (layer.type === 'shape') {
                    ctx.fillStyle = layer.color;
                    ctx.strokeStyle = layer.color;
                    ctx.lineWidth = 6;
                    
                    if (layer.shapeType === 'rect') {
                        ctx.fillRect(layer.x, layer.y, layer.w, layer.h);
                        layer.realW = layer.w; layer.realH = layer.h;
                    } else if (layer.shapeType === 'circle') {
                        ctx.beginPath();
                        // 楕円描画に対応（ellipseメソッドを採用）
                        ctx.ellipse(layer.x + layer.w/2, layer.y + layer.h/2, layer.w/2, layer.h/2, 0, 0, Math.PI * 2);
                        ctx.fill();
                        layer.realW = layer.w; layer.realH = layer.h;
                    } else if (layer.shapeType === 'line') {
                        ctx.beginPath(); 
                        ctx.moveTo(layer.x, layer.y + layer.h/2); 
                        ctx.lineTo(layer.x + layer.w, layer.y + layer.h/2); 
                        ctx.stroke();
                        layer.realW = layer.w; layer.realH = layer.h;
                    }
                } 
                else if (layer.type === 'image' && layer.img) {
                    ctx.drawImage(layer.img, layer.x, layer.y, layer.w, layer.h);
                    layer.realW = layer.w; layer.realH = layer.h;
                }

                // 選択中枠線のオーバレイ表示（回転状態を維持した枠線）
                if (index === appState.selectedLayerIndex) {
                    ctx.restore(); ctx.save();
                    // 再び同じ回転マトリクスを適用してバウンディングボックスを描画
                    ctx.translate(cx, cy);
                    if (layer.angle) ctx.rotate((layer.angle * Math.PI) / 180);
                    ctx.translate(-cx, -cy);
                    
                    ctx.strokeStyle = '#10b981'; ctx.lineWidth = 3; ctx.setLineDash([6, 4]);
                    const tw = layer.type === 'text' ? layer.realW : layer.w;
                    const th = layer.type === 'text' ? layer.realH : layer.h;
                    ctx.strokeRect(layer.x - 6, layer.y - 6, tw + 12, th + 12);
                }
                ctx.restore();
            });

            updateLayerUI();
            updateControlSlidersUI();
        }

        function drawBackground() {
            ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (appState.bgType === 'solid') {
                ctx.fillStyle = appState.bgColor; ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else if (appState.bgType === 'gradient') {
                let grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                if (appState.bgPattern === 'grad-modern') { grad.addColorStop(0, '#6366f1'); grad.addColorStop(1, '#a855f7'); }
                else { grad.addColorStop(0, '#f59e0b'); grad.addColorStop(1, '#f43f5e'); }
                ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else if (appState.bgType === 'image' && appState.bgImage) {
                ctx.save(); ctx.globalAlpha = appState.bgOpacity;
                ctx.drawImage(appState.bgImage, 0, 0, canvas.width, canvas.height); ctx.restore();
            }
        }

        function setBg(type, val) {
            if (type === 'solid') { appState.bgType = 'solid'; appState.bgColor = val; }
            else { appState.bgType = 'gradient'; appState.bgPattern = type; }
            render();
        }

        function addText() {
            const txt = document.getElementById('text-input').value || 'テキスト';
            appState.layers.push({
                type: 'text', text: txt, x: 200, y: 300, w: 60, h: 60, angle: 0, opacity: 1,
                fontFamily: document.getElementById('text-font').value, color: document.getElementById('text-color').value, realW: 200, realH: 60
            });
            appState.selectedLayerIndex = appState.layers.length - 1;
            render();
        }

        function addShape(shapeType) {
            const color = document.getElementById('shape-color').value;
            let item = { type: 'shape', shapeType: shapeType, x: 300, y: 300, color: color, w: 250, h: 250, angle: 0, opacity: 1 };
            if (shapeType === 'line') { item.h = 20; item.w = 400; item.y = 400; }
            appState.layers.push(item);
            appState.selectedLayerIndex = appState.layers.length - 1;
            render();
        }

        function deleteSelectedLayer() {
            if (appState.selectedLayerIndex !== null) {
                appState.layers.splice(appState.selectedLayerIndex, 1);
                appState.selectedLayerIndex = null; render();
            }
        }

        function moveLayerOrder(dir) {
            const idx = appState.selectedLayerIndex; if (idx === null) return;
            if (dir === 'up' && idx < appState.layers.length - 1) {
                [appState.layers[idx], appState.layers[idx + 1]] = [appState.layers[idx + 1], appState.layers[idx]];
                appState.selectedLayerIndex = idx + 1;
            } else if (dir === 'down' && idx > 0) {
                [appState.layers[idx], appState.layers[idx - 1]] = [appState.layers[idx - 1], appState.layers[idx]];
                appState.selectedLayerIndex = idx - 1;
            }
            render();
        }

        function updateLayerUI() {
            document.getElementById('layer-count').innerText = appState.layers.length;
            const container = document.getElementById('layer-list'); container.innerHTML = '';
            if (appState.layers.length === 0) return;

            [...appState.layers].reverse().forEach((layer, revIdx) => {
                const actualIdx = appState.layers.length - 1 - revIdx;
                const isSelected = actualIdx === appState.selectedLayerIndex;
                const item = document.createElement('div');
                item.className = `flex justify-between items-center p-1.5 rounded text-xs cursor-pointer ${isSelected ? 'bg-emerald-400 text-black font-bold' : 'bg-[#2a2a30] text-zinc-300'}`;
                item.innerText = `${actualIdx + 1}. [${layer.type}] ${layer.text || layer.shapeType || '画像'}`;
                item.onclick = () => { appState.selectedLayerIndex = actualIdx; render(); };
                container.appendChild(item);
            });
        }

        // 動的スライダーコントロールの出し分け
        function updateControlSlidersUI() {
            const inspector = document.getElementById('inspector');
            const slidersContainer = document.getElementById('universal-sliders');
            
            if (appState.selectedLayerIndex === null) {
                inspector.classList.add('hidden'); slidersContainer.classList.add('hidden'); return;
            }

            const layer = appState.layers[appState.selectedLayerIndex];
            inspector.classList.remove('hidden'); slidersContainer.classList.remove('hidden');
            document.getElementById('inspector-title').innerText = `設定: [${layer.type}]`;

            // 角度値の同期
            document.getElementById('object-angle').value = layer.angle || 0;
            document.getElementById('angle-slider-value').innerText = (layer.angle || 0) + '°';

            const sizeXInput = document.getElementById('object-size-x');
            const sizeYInput = document.getElementById('object-size-y');
            const containerY = document.getElementById('container-size-y');

            if (layer.type === 'shape' && layer.shapeType !== 'line') {
                // 長方形・円の場合は縦横を完全に独立制御
                containerY.classList.remove('hidden');
                document.getElementById('label-size-x').innerText = "幅 (横サイズ)";
                document.getElementById('label-size-y').innerText = "高さ (縦サイズ)";
                
                sizeXInput.min = 10; sizeXInput.max = 1080; sizeXInput.value = layer.w;
                sizeYInput.min = 10; sizeYInput.max = 1080; sizeYInput.value = layer.h;
                
                document.getElementById('val-size-x').innerText = layer.w + " px";
                document.getElementById('val-size-y').innerText = layer.h + " px";
            } else if (layer.type === 'shape' && layer.shapeType === 'line') {
                // 直線は長さのみ
                containerY.classList.add('hidden');
                document.getElementById('label-size-x').innerText = "線の長さ";
                sizeXInput.min = 10; sizeXInput.max = 1080; sizeXInput.value = layer.w;
                document.getElementById('val-size-x').innerText = layer.w + " px";
            } else if (layer.type === 'text') {
                // テキストはフォントサイズ単一制御
                containerY.classList.add('hidden');
                document.getElementById('label-size-x').innerText = "文字サイズ";
                sizeXInput.min = 10; sizeXInput.max = 300; sizeXInput.value = layer.w; // テキストではwがサイズ
                document.getElementById('val-size-x').innerText = layer.w + " pt";
            } else if (layer.type === 'image') {
                // 画像も独立して縦横変更できるように開放
                containerY.classList.remove('hidden');
                document.getElementById('label-size-x').innerText = "画像幅";
                document.getElementById('label-size-y').innerText = "画像高さ";
                sizeXInput.min = 10; sizeXInput.max = 1080; sizeXInput.value = layer.w;
                sizeYInput.min = 10; sizeYInput.max = 1080; sizeYInput.value = layer.h;
                document.getElementById('val-size-x').innerText = layer.w + " px";
                document.getElementById('val-size-y').innerText = layer.h + " px";
            }
        }

        function setupEventListeners() {
            document.getElementById('export-size').addEventListener('change', (e) => {
                const [w, h] = e.target.value.split('x').map(Number);
                canvas.width = w; canvas.height = h;
                canvas.className = "max-w-full max-h-full block bg-white";
                if(w === h) canvas.style.aspectRatio = "1 / 1";
                else if(w < h) canvas.style.aspectRatio = "1080 / 1920";
                else canvas.style.aspectRatio = "1200 / 630";
                render();
            });

            document.getElementById('bg-upload').addEventListener('change', (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (el) => { 
                    const img = new Image(); 
                    img.onload = () => { appState.bgType = 'image'; appState.bgImage = img; render(); }; 
                    img.src = el.target.result; 
                };
                reader.readAsDataURL(file);
            });

            document.getElementById('layer-image-upload').addEventListener('change', (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (el) => {
                    const img = new Image();
                    img.onload = () => {
                        let w = img.width, h = img.height; if (w > 400) { h = (400 / w) * h; w = 400; }
                        appState.layers.push({ type: 'image', img: img, x: 200, y: 200, w: w, h: h, angle: 0, opacity: 1 });
                        appState.selectedLayerIndex = appState.layers.length - 1; render();
                    };
                    img.src = el.target.result;
                };
                reader.readAsDataURL(file);
            });

            // 角度スライダーイベント
            document.getElementById('object-angle').addEventListener('input', (e) => {
                if (appState.selectedLayerIndex !== null) {
                    appState.layers[appState.selectedLayerIndex].angle = parseInt(e.target.value);
                    render();
                }
            });

            // 動的横幅・サイズ変更スライダーイベント
            document.getElementById('object-size-x').addEventListener('input', (e) => {
                if (appState.selectedLayerIndex !== null) {
                    const layer = appState.layers[appState.selectedLayerIndex];
                    layer.w = parseInt(e.target.value);
                    render();
                }
            });

            // 動的縦幅変更スライダーイベント
            document.getElementById('object-size-y').addEventListener('input', (e) => {
                if (appState.selectedLayerIndex !== null) {
                    const layer = appState.layers[appState.selectedLayerIndex];
                    layer.h = parseInt(e.target.value);
                    render();
                }
            });

            document.getElementById('btn-save').addEventListener('click', () => {
                const prev = appState.selectedLayerIndex; appState.selectedLayerIndex = null; render();
                const link = document.createElement('a'); link.download = `infographic_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png'); link.click();
                appState.selectedLayerIndex = prev; render();
            });

            // タップ位置計算（逆行列なしの簡易ヒットテスト。非回転時の矩形で判定します）
            const getCanvasCoords = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clX = e.touches ? e.touches[0].clientX : e.clientX;
                const clY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: ((clX - rect.left) / rect.width) * canvas.width, y: ((clY - rect.top) / rect.height) * canvas.height };
            };

            const handlePointerDown = (e) => {
                const coords = getCanvasCoords(e); let hit = false;
                for (let i = appState.layers.length - 1; i >= 0; i--) {
                    const layer = appState.layers[i];
                    const tw = layer.type === 'text' ? layer.realW : layer.w;
                    const th = layer.type === 'text' ? layer.realH : layer.h;
                    if (coords.x >= layer.x && coords.x <= layer.x + tw && coords.y >= layer.y && coords.y <= layer.y + th) {
                        appState.selectedLayerIndex = i; appState.isDragging = true;
                        appState.startX = coords.x - layer.x; appState.startY = coords.y - layer.y; hit = true; break;
                    }
                }
                if (!hit) appState.selectedLayerIndex = null; render();
            };

            canvas.addEventListener('mousedown', handlePointerDown);
            window.addEventListener('mousemove', (e) => {
                if (!appState.isDragging || appState.selectedLayerIndex === null) return;
                const coords = getCanvasCoords(e); const layer = appState.layers[appState.selectedLayerIndex];
                layer.x = coords.x - appState.startX; layer.y = coords.y - appState.startY; render();
            });
            window.addEventListener('mouseup', () => { appState.isDragging = false; });
            canvas.addEventListener('touchstart', (e) => { handlePointerDown(e); }, { passive: false });
            canvas.addEventListener('touchmove', (e) => {
                if (!appState.isDragging || appState.selectedLayerIndex === null) return; e.preventDefault();
                const coords = getCanvasCoords(e); const layer = appState.layers[appState.selectedLayerIndex];
                layer.x = coords.x - appState.startX; layer.y = coords.y - appState.startY; render();
            }, { passive: false });
            canvas.addEventListener('touchend', () => { appState.isDragging = false; });
        }
    </script>
</body>
</html>
